<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Monasterium</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#130722">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Monasterium">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
  @font-face {
    font-family: 'GothicLocal';
    src: local('MS Gothic'), local('MS ゴシック'), local('MSGothic'), local('MS PGothic'),
         url('msgothic.ttf') format('truetype'),
         url('msgothic.ttc') format('truetype'),
         url('gothic.ttf') format('truetype');
    font-display: swap;
  }
  :root {
    --bg-deep:#130722; --bg-mid:#1d0d33; --bg-edge:#0d0418;
    --ink:#ffffff; --ink-soft:#e8def5; --accent:#b98bff;
    --line:rgba(185,139,255,0.22);
    --font:'GothicLocal','MS Gothic','MS PGothic','Noto Sans JP',monospace;
    --outline:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,0 -1px 0 #000,0 1px 0 #000,-1px 0 0 #000,1px 0 0 #000;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:var(--bg-deep); color:var(--ink); font-family:var(--font); -webkit-user-select:none; user-select:none; overscroll-behavior:none; }
  body { background:radial-gradient(120% 90% at 50% 0%,var(--bg-mid) 0%,var(--bg-deep) 55%,var(--bg-edge) 100%); }

  /* ---------- Library ---------- */
  #library { position:absolute; inset:0; display:flex; flex-direction:column; padding:env(safe-area-inset-top) 0 0 0; }
  #library.hidden { display:none; }
  .lib-head { padding:26px 22px 14px; border-bottom:1px solid var(--line); }
  .lib-head-row { display:flex; align-items:center; }
  .lib-title { flex:1; font-size:30px; font-weight:bold; letter-spacing:0.04em; text-shadow:var(--outline); }
  .lib-sub { margin-top:6px; font-size:13px; color:var(--ink-soft); text-shadow:var(--outline); opacity:0.85; }
  .iconbtn { background:none; border:none; color:var(--ink); font-size:22px; line-height:1; padding:6px 4px; text-shadow:var(--outline); font-family:var(--font); }
  .iconbtn:active { color:var(--accent); }
  .lib-actions { display:flex; gap:10px; flex-wrap:wrap; padding:12px 22px 4px; }
  .chip { display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border:1px solid var(--accent); border-radius:999px; background:rgba(185,139,255,0.10); color:var(--ink); font-family:var(--font); font-size:14px; text-shadow:var(--outline); }
  .chip:active { background:rgba(185,139,255,0.24); }
  .chip.ghost { border-color:var(--line); background:none; }

  #file-list { flex:1; overflow-y:auto; padding:6px 0 40px; -webkit-overflow-scrolling:touch; }
  .backrow { padding:14px 22px; border-bottom:1px solid var(--line); color:var(--accent); font-size:14px; text-shadow:var(--outline); }
  .backrow:active { background:rgba(185,139,255,0.12); }
  .searchrow { padding:12px 18px; border-bottom:1px solid var(--line); }
  .searchrow input { width:100%; padding:10px 13px; border:1px solid var(--line); border-radius:10px; background:rgba(0,0,0,0.3); color:var(--ink); font-family:var(--font); font-size:15px; -webkit-user-select:text; user-select:text; }
  .searchrow input:focus { outline:none; border-color:var(--accent); }

  .author { display:flex; align-items:center; gap:14px; padding:12px 18px; border-bottom:1px solid var(--line); }
  .author:active { background:rgba(185,139,255,0.12); }
  .cover { width:56px; height:56px; flex:0 0 auto; border-radius:11px; overflow:hidden; background:rgba(185,139,255,0.12); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:22px; text-shadow:var(--outline); }
  .cover img { width:100%; height:100%; object-fit:cover; display:block; }
  .author .meta { flex:1; min-width:0; }
  .author .aname { font-size:17px; text-shadow:var(--outline); word-break:break-word; }
  .author .acount { font-size:11px; color:var(--accent); opacity:0.8; text-shadow:var(--outline); margin-top:2px; }
  .author .chev { color:var(--ink-soft); opacity:0.5; font-size:20px; }

  .file { padding:15px 22px; border-bottom:1px solid var(--line); }
  .file:active { background:rgba(185,139,255,0.12); }
  .file .name { font-size:16px; color:var(--ink); text-shadow:var(--outline); word-break:break-word; }
  .file .badge { font-size:11px; color:#1a0b2e; background:var(--accent); border-radius:999px; padding:1px 8px; margin-left:6px; vertical-align:middle; }
  .file .snip { margin-top:5px; font-size:12px; color:var(--ink-soft); opacity:0.8; text-shadow:var(--outline); line-height:1.5; }

  .empty { padding:40px 26px; text-align:center; color:var(--ink-soft); opacity:0.78; font-size:14px; line-height:1.75; text-shadow:var(--outline); }
  .empty code { background:rgba(185,139,255,0.16); padding:0.05em 0.3em; border-radius:4px; }

  /* ---------- Settings ---------- */
  .overlay { position:absolute; inset:0; background:rgba(7,3,14,0.72); display:flex; align-items:center; justify-content:center; padding:22px; z-index:20; }
  .overlay.hidden { display:none; }
  .panel { width:100%; max-width:420px; background:var(--bg-mid); border:1px solid var(--line); border-radius:16px; padding:20px 18px 18px; max-height:88vh; overflow-y:auto; }
  .panel-title { font-size:18px; font-weight:bold; text-shadow:var(--outline); margin-bottom:14px; }
  .fld { display:block; font-size:12px; color:var(--ink-soft); text-shadow:var(--outline); margin-bottom:12px; }
  .fld input { display:block; width:100%; margin-top:5px; padding:10px 12px; border:1px solid var(--line); border-radius:9px; background:rgba(0,0,0,0.32); color:var(--ink); font-family:var(--font); font-size:15px; -webkit-user-select:text; user-select:text; }
  .fld input:focus { outline:none; border-color:var(--accent); }
  .hint { font-size:11px; line-height:1.6; color:var(--ink-soft); opacity:0.7; text-shadow:var(--outline); margin:-4px 0 14px; }
  .panel-actions { display:flex; gap:10px; justify-content:flex-end; }

  /* ---------- Reader ---------- */
  #reader { position:absolute; inset:0; display:none; overflow:hidden; touch-action:none; }
  #reader.active { display:block; }
  #book { position:absolute; overflow:hidden; }
  #page { position:relative; }
  #measure { position:absolute; top:0; left:0; width:100%; visibility:hidden; pointer-events:none; z-index:-1; }
  #book h1,#book h2,#book h3,#book h4,#book h5,#book h6 { margin:0.2em 0 0.5em; line-height:1.25; text-shadow:var(--outline); color:var(--ink); }
  #book h1{font-size:1.5em;} #book h2{font-size:1.28em;} #book h3{font-size:1.14em;color:var(--ink-soft);} #book h4,#book h5,#book h6{font-size:1.03em;color:var(--ink-soft);}
  #book p { margin:0 0 0.9em; font-size:16px; line-height:1.7; text-shadow:var(--outline); text-align:left; }
  #book ul,#book ol { margin:0 0 0.9em; padding-left:1.4em; }
  #book li { font-size:16px; line-height:1.68; margin-bottom:0.3em; text-shadow:var(--outline); }
  #book a { color:var(--accent); text-decoration:underline; }
  #book strong { font-weight:bold; } #book em { font-style:italic; }
  #book code { font-family:var(--font); background:rgba(185,139,255,0.14); padding:0.05em 0.35em; border-radius:4px; font-size:0.92em; }
  #book pre { background:rgba(0,0,0,0.35); border:1px solid var(--line); border-radius:8px; padding:12px 14px; overflow:hidden; margin:0 0 0.9em; }
  #book pre code { background:none; padding:0; font-size:13px; line-height:1.55; text-shadow:none; white-space:pre-wrap; word-break:break-word; }
  #book blockquote { margin:0 0 0.9em; padding:0.1em 0 0.1em 1em; border-left:3px solid var(--accent); color:var(--ink-soft); }
  #book hr { border:none; height:1px; background:var(--line); margin:1.2em 0; }
  #book mark { background:rgba(185,139,255,0.35); color:var(--ink); border-radius:2px; }
  #book mark.cur { background:var(--accent); color:#1a0b2e; text-shadow:none; }

  #topbar { position:absolute; top:0; left:0; right:0; height:calc(40px + env(safe-area-inset-top)); padding-top:env(safe-area-inset-top); display:flex; align-items:center; padding-left:12px; padding-right:12px; z-index:6; pointer-events:none; }
  #topbar > * { pointer-events:auto; }
  #back, #findbtn { font-size:22px; line-height:1; padding:8px 12px; color:var(--ink); text-shadow:var(--outline); }
  #back:active, #findbtn:active { color:var(--accent); }
  #doc-title { flex:1; text-align:center; font-size:12px; color:var(--ink-soft); opacity:0.8; text-shadow:var(--outline); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 6px; pointer-events:none; }

  #findbar { position:absolute; left:0; right:0; top:calc(40px + env(safe-area-inset-top)); z-index:7; display:flex; align-items:center; gap:6px; padding:8px 10px; background:var(--bg-mid); border-bottom:1px solid var(--line); }
  #findbar.hidden { display:none; }
  #findinput { flex:1; min-width:0; padding:8px 11px; border:1px solid var(--line); border-radius:8px; background:rgba(0,0,0,0.3); color:var(--ink); font-family:var(--font); font-size:15px; -webkit-user-select:text; user-select:text; }
  #findinput:focus { outline:none; border-color:var(--accent); }
  #findcount { font-size:12px; color:var(--ink-soft); min-width:42px; text-align:center; text-shadow:var(--outline); }
  #findbar button { background:none; border:1px solid var(--line); border-radius:8px; color:var(--ink); font-family:var(--font); font-size:16px; padding:6px 11px; text-shadow:var(--outline); }
  #findbar button:active { background:rgba(185,139,255,0.2); }

  #pageno { position:absolute; left:0; right:0; bottom:calc(8px + env(safe-area-inset-bottom)); text-align:center; font-size:11px; color:var(--ink-soft); opacity:0.7; text-shadow:var(--outline); z-index:5; pointer-events:none; }
</style>
</head>
<body>

  <div id="library">
    <div class="lib-head">
      <div class="lib-head-row">
        <div class="lib-title">Monasterium</div>
        <button id="gear" class="iconbtn" aria-label="Settings">⚙</button>
      </div>
      <div class="lib-sub" id="lib-sub">Your library.</div>
    </div>
    <div class="lib-actions">
      <button class="chip" id="refresh">↻&nbsp;Refresh</button>
      <label class="chip ghost" for="picker">📂&nbsp;Local folder</label>
      <input type="file" id="picker" webkitdirectory directory multiple style="display:none">
    </div>
    <div id="file-list"><div class="empty" id="empty">…</div></div>
  </div>

  <div id="settings" class="overlay hidden">
    <div class="panel">
      <div class="panel-title">Library source</div>
      <label class="fld">Owner<input id="s-owner" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
      <label class="fld">Repository<input id="s-repo" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
      <label class="fld">Branch<input id="s-branch" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
      <label class="fld">Access token<input id="s-token" type="password" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
      <div class="hint">Fine-grained token with read-only Contents access to the private repo. Stored only on this device.</div>
      <div class="panel-actions">
        <button class="chip ghost" id="s-cancel">Cancel</button>
        <button class="chip" id="s-save">Save</button>
      </div>
    </div>
  </div>

  <div id="reader">
    <div id="topbar">
      <div id="back">‹</div>
      <div id="doc-title"></div>
      <div id="findbtn" aria-label="Find">🔍</div>
    </div>
    <div id="findbar" class="hidden">
      <input id="findinput" type="search" inputmode="search" placeholder="Find in this work…" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
      <span id="findcount"></span>
      <button id="findprev" aria-label="Previous match">‹</button>
      <button id="findnext" aria-label="Next match">›</button>
      <button id="findclose" aria-label="Close find">✕</button>
    </div>
    <div id="book"><div id="measure"></div><div id="page"></div></div>
    <div id="pageno"></div>
  </div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var library=$('library'), reader=$('reader'), book=$('book'), pageEl=$('page'), measurer=$('measure');
  var fileList=$('file-list'), libSub=$('lib-sub');
  var docTitle=$('doc-title'), pageno=$('pageno'), backBtn=$('back');
  var settings=$('settings'), gear=$('gear'), refreshBtn=$('refresh'), picker=$('picker');
  var findbtn=$('findbtn'), findbar=$('findbar'), findInput=$('findinput'), findCount=$('findcount');

  var model = { order:[], groups:{}, loose:[] };
  var CFG_KEY='monasterium.cfg', LIST_KEY='monasterium.tree', BOOKS='monasterium-books';
  var cfg = loadCfg();

  // reader state
  var blocks=[], blockTop=[], blockH=[], measuredCount=0, totalHeight=0;
  var pageStarts=[{b:0,o:0}], totalPages=1, page=0, pageH=0, sideM=24;
  var measuring=false, measureToken=0, pgCurY=0, pgBlock=0, pendingY=0, firstRenderDone=false;
  var currentTerm='', matches=[], curMatch=-1;

  function loadCfg(){
    var d={owner:'lilua2012',repo:'monasterium-library',branch:'main',token:''};
    try { var raw=localStorage.getItem(CFG_KEY); if(raw){var o=JSON.parse(raw); for(var k in o) d[k]=o[k];} } catch(e){}
    return d;
  }
  function saveCfg(){ try{ localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }catch(e){} }
  function apiBase(){ return 'https://api.github.com/repos/'+cfg.owner+'/'+cfg.repo; }
  function jsonHeaders(){ var h={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}; if(cfg.token) h['Authorization']='Bearer '+cfg.token; return h; }
  function rawHeaders(){ var h={'Accept':'application/vnd.github.raw','X-GitHub-Api-Version':'2022-11-28'}; if(cfg.token) h['Authorization']='Bearer '+cfg.token; return h; }

  // ---------- Markdown ----------
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    s=esc(s);
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/__([^_]+)__/g,'<strong>$1</strong>');
    s=s.replace(/(^|[^\*])\*([^*\n]+)\*/g,'$1<em>$2</em>');
    s=s.replace(/(^|[^_])_([^_\n]+)_/g,'$1<em>$2</em>');
    s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2">$1</a>');
    return s;
  }
  // returns an array of top-level block HTML strings
  function mdToBlocks(src){
    src=src.replace(/\r\n?/g,'\n');
    var lines=src.split('\n'), out=[], i=0;
    var blockStart=/^(#{1,6}\s|```|\s*>|\s*[-*+]\s|\s*\d+\.\s)/;
    while(i<lines.length){
      var line=lines[i];
      if(/^\s*$/.test(line)){i++;continue;}
      if(/^\s*```/.test(line)){ i++; var code=''; while(i<lines.length&&!/^\s*```/.test(lines[i])){code+=lines[i]+'\n';i++;} i++; out.push('<pre><code>'+esc(code.replace(/\n$/,''))+'</code></pre>'); continue; }
      var h=line.match(/^(#{1,6})\s+(.*)$/);
      if(h){ var n=h[1].length; out.push('<h'+n+'>'+inline(h[2])+'</h'+n+'>'); i++; continue; }
      if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)){ out.push('<hr>'); i++; continue; }
      if(/^\s*>/.test(line)){ var q=''; while(i<lines.length&&/^\s*>/.test(lines[i])){q+=lines[i].replace(/^\s*>\s?/,'')+'\n';i++;} out.push('<blockquote>'+mdToBlocks(q).join('')+'</blockquote>'); continue; }
      if(/^\s*[-*+]\s+/.test(line)){ var u='<ul>'; while(i<lines.length&&/^\s*[-*+]\s+/.test(lines[i])){u+='<li>'+inline(lines[i].replace(/^\s*[-*+]\s+/,''))+'</li>';i++;} out.push(u+'</ul>'); continue; }
      if(/^\s*\d+\.\s+/.test(line)){ var ol='<ol>'; while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){ol+='<li>'+inline(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>';i++;} out.push(ol+'</ol>'); continue; }
      var p=''; while(i<lines.length&&!/^\s*$/.test(lines[i])&&!blockStart.test(lines[i])){ p+=(p?' ':'')+lines[i].trim(); i++; }
      out.push('<p>'+inline(p)+'</p>');
    }
    return out;
  }

  // ---------- helpers ----------
  function basename(p){ return p.replace(/^.*\//,''); }
  function titleOf(path){
    var b=basename(path).replace(/\.(md|markdown|txt)$/i,'');
    var parts=b.split('_'); if(parts.length>1) parts.shift();
    return parts.join(' ').replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
  }
  function backRow(label, fn){ var b=document.createElement('div'); b.className='backrow'; b.textContent=label; b.addEventListener('click', fn); return b; }
  function setEmpty(html){ fileList.innerHTML='<div class="empty">'+html+'</div>'; }

  // ---------- Build model ----------
  function buildModel(tree){
    var groups={}, order=[], loose=[];
    var IMG=/\.(png|jpe?g|webp|gif)$/i, MD=/\.(md|markdown)$/i;
    tree.forEach(function(e){
      if(e.type!=='blob' || e.path.indexOf('books/')!==0) return;
      var rel=e.path.slice(6), slash=rel.indexOf('/');
      if(slash<0){ if(MD.test(rel)&&rel.toLowerCase()!=='readme.md') loose.push({sha:e.sha,path:e.path,name:titleOf(e.path)}); return; }
      var author=rel.slice(0,slash);
      if(!groups[author]){ groups[author]={name:author,cover:null,works:[]}; order.push(author); }
      if(MD.test(rel)&&basename(rel).toLowerCase()!=='readme.md'){ groups[author].works.push({sha:e.sha,path:e.path,name:titleOf(e.path)}); }
      else if(IMG.test(rel)){ var pref=basename(rel).toLowerCase().indexOf('cover')===0; if(!groups[author].cover||pref) groups[author].cover={sha:e.sha,path:e.path}; }
    });
    order.sort(function(a,b){return a.localeCompare(b);});
    Object.keys(groups).forEach(function(k){ groups[k].works.sort(function(a,b){return a.path.localeCompare(b.path);}); });
    loose.sort(function(a,b){return a.path.localeCompare(b.path);});
    return { order:order, groups:groups, loose:loose };
  }

  function loadLibrary(){
    if(!cfg.token){ libSub.textContent='Not configured.'; setEmpty('No access token yet.<br>Tap the ⚙ gear to enter your repository and token.'); return; }
    libSub.textContent='Loading…'; setEmpty('Loading…');
    fetch(apiBase()+'/git/trees/'+encodeURIComponent(cfg.branch)+'?recursive=1',{headers:jsonHeaders()})
      .then(function(r){
        if(r.status===401) throw new Error('Token rejected (401). Check the token value.');
        if(r.status===403) throw new Error('Access forbidden (403). Check the token’s permissions.');
        if(r.status===404) throw new Error('Repo or branch not found (404), or no access.');
        if(!r.ok) throw new Error('GitHub error '+r.status+'.');
        return r.json();
      })
      .then(function(data){ var tree=(data&&data.tree)||[]; model=buildModel(tree); try{localStorage.setItem(LIST_KEY,JSON.stringify(tree));}catch(e){} renderAuthors(); })
      .catch(function(err){
        var cached=null; try{ cached=JSON.parse(localStorage.getItem(LIST_KEY)||'null'); }catch(e){}
        if(cached){ model=buildModel(cached); libSub.textContent='Offline — saved library.'; renderAuthors(); }
        else { libSub.textContent='Could not load.'; setEmpty(esc(err.message||'Failed to load.')+'<br><br>Tap ⚙ to review settings.'); }
      });
  }

  // ---------- Author images ----------
  function getImageURL(sha){
    function toURL(b){ return URL.createObjectURL(b); }
    function net(){ return fetch(apiBase()+'/git/blobs/'+sha,{headers:rawHeaders()}).then(function(r){ if(!r.ok) throw new Error('img'); return r.blob(); }); }
    if(!('caches' in window)) return net().then(toURL);
    return caches.open(BOOKS).then(function(c){ return c.match('img/'+sha).then(function(hit){ if(hit) return hit.blob().then(toURL); return net().then(function(b){ try{c.put('img/'+sha,new Response(b));}catch(e){} return toURL(b); }); }); });
  }

  // ---------- Render: authors ----------
  function renderAuthors(){
    var nA=model.order.length, nL=model.loose.length;
    if(!nA && !nL){ libSub.textContent=cfg.token?'Empty library.':'Your library.'; setEmpty('No documents found.<br>Add <code>.md</code> files under <b>books/&lt;author&gt;/</b> and push, then Refresh.'); return; }
    libSub.textContent = nA + (nA===1?' author':' authors');
    fileList.innerHTML='';
    model.loose.forEach(function(w){ fileList.appendChild(fileRow(w)); });
    model.order.forEach(function(name){
      var g=model.groups[name];
      var row=document.createElement('div'); row.className='author';
      var cov=document.createElement('div'); cov.className='cover'; cov.textContent=(name[0]||'?').toUpperCase();
      var meta=document.createElement('div'); meta.className='meta';
      meta.innerHTML='<div class="aname">'+esc(name)+'</div><div class="acount">'+g.works.length+(g.works.length===1?' work':' works')+'</div>';
      var chev=document.createElement('div'); chev.className='chev'; chev.textContent='›';
      row.appendChild(cov); row.appendChild(meta); row.appendChild(chev);
      row.addEventListener('click', function(){ renderWorks(name); });
      fileList.appendChild(row);
      if(g.cover){ getImageURL(g.cover.sha).then(function(url){ var im=new Image(); im.onload=function(){ cov.textContent=''; cov.appendChild(im); }; im.src=url; }).catch(function(){}); }
    });
    fileList.scrollTop=0;
  }
  function fileRow(w){
    var div=document.createElement('div'); div.className='file';
    div.innerHTML='<div class="name">'+esc(w.name)+'</div>';
    div.addEventListener('click', function(){ openWork(w); });
    return div;
  }

  // ---------- Render: one author's works ----------
  function renderWorks(name){
    var g=model.groups[name]; if(!g) return;
    libSub.textContent=name+' — '+g.works.length+(g.works.length===1?' work':' works');
    fileList.innerHTML='';
    fileList.appendChild(backRow('‹ All authors', renderAuthors));
    var sr=document.createElement('div'); sr.className='searchrow';
    var inp=document.createElement('input'); inp.type='search'; inp.placeholder='Search '+name+'…';
    inp.setAttribute('autocapitalize','none'); inp.setAttribute('autocorrect','off'); inp.autocomplete='off';
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ var v=inp.value.trim(); if(v) runAuthorSearch(name, v); } });
    sr.appendChild(inp); fileList.appendChild(sr);
    g.works.forEach(function(w){ fileList.appendChild(fileRow(w)); });
    fileList.scrollTop=0;
  }

  // ---------- Per-author search ----------
  function snippet(t, pos, len){ var s=Math.max(0,pos-44), e=Math.min(t.length,pos+len+56); var str=t.slice(s,e).replace(/\s+/g,' ').trim(); return (s>0?'…':'')+str+(e<t.length?'…':''); }
  function runAuthorSearch(name, term){
    var g=model.groups[name]; if(!g) return;
    var works=g.works.slice(), results=[], i=0, q=term.toLowerCase();
    libSub.textContent='Searching '+name+'…';
    fileList.innerHTML='';
    fileList.appendChild(backRow('‹ '+name+' works', function(){ renderWorks(name); }));
    var prog=document.createElement('div'); prog.className='empty'; prog.textContent='Searching… 0 / '+works.length; fileList.appendChild(prog);
    function stepN(){
      if(i>=works.length){ renderResults(name, term, results); return; }
      var w=works[i++]; prog.textContent='Searching… '+i+' / '+works.length;
      getText(w).then(function(t){
        var low=t.toLowerCase(), pos=low.indexOf(q), count=0, first=-1;
        while(pos>=0){ if(first<0) first=pos; count++; if(count>=2000) break; pos=low.indexOf(q,pos+q.length); }
        if(count>0) results.push({w:w, count:count, snip:snippet(t, first, q.length)});
        stepN();
      }).catch(stepN);
    }
    stepN();
  }
  function renderResults(name, term, results){
    libSub.textContent=results.length+' of '+model.groups[name].works.length+' works contain “'+term+'”';
    fileList.innerHTML='';
    fileList.appendChild(backRow('‹ '+name+' works', function(){ renderWorks(name); }));
    if(!results.length){ var em=document.createElement('div'); em.className='empty'; em.innerHTML='No matches for “'+esc(term)+'”.'; fileList.appendChild(em); return; }
    results.sort(function(a,b){ return b.count-a.count; });
    results.forEach(function(r){
      var div=document.createElement('div'); div.className='file';
      div.innerHTML='<div class="name">'+esc(r.w.name)+'<span class="badge">'+r.count+'</span></div><div class="snip">'+esc(r.snip)+'</div>';
      div.addEventListener('click', function(){ openWork(r.w, term); });
      fileList.appendChild(div);
    });
    fileList.scrollTop=0;
  }

  // ---------- Local folder fallback ----------
  picker.addEventListener('change', function(e){
    var picked=Array.prototype.slice.call(e.target.files||[]);
    var works=picked.filter(function(f){return /\.(md|markdown|txt)$/i.test(f.name);})
      .map(function(f){ var path=f.webkitRelativePath||f.name; return {file:f,path:path,name:titleOf(path)}; })
      .sort(function(a,b){return a.path.localeCompare(b.path);});
    libSub.textContent='Local folder — '+works.length+' files';
    fileList.innerHTML='';
    fileList.appendChild(backRow('‹ Library', renderAuthors));
    if(!works.length){ var em=document.createElement('div'); em.className='empty'; em.textContent='No markdown files in that folder.'; fileList.appendChild(em); }
    works.forEach(function(w){ fileList.appendChild(fileRow(w)); });
    fileList.scrollTop=0;
  });

  // ---------- Get text ----------
  function getText(w){
    if(w.file) return w.file.text();
    if(!('caches' in window)) return fetchBlobText(w.sha);
    return caches.open(BOOKS).then(function(c){ return c.match('book/'+w.sha).then(function(hit){ if(hit) return hit.text(); return fetchBlobText(w.sha).then(function(t){ try{c.put('book/'+w.sha,new Response(t));}catch(e){} return t; }); }); });
  }
  function fetchBlobText(sha){ return fetch(apiBase()+'/git/blobs/'+sha,{headers:rawHeaders()}).then(function(r){ if(!r.ok) throw new Error('Could not fetch document ('+r.status+').'); return r.text(); }); }

  // ---------- Reader: windowed paging ----------
  function setMetrics(){
    var W=window.innerWidth, H=window.innerHeight, topM=46, botM=40;
    sideM=Math.max(20,Math.round(W*0.06)); pageH=H-topM-botM;
    book.style.left=sideM+'px'; book.style.width=(W-2*sideM)+'px'; book.style.top=topM+'px'; book.style.height=pageH+'px';
  }
  function absY(ps){ return (blockTop[ps.b]||0)+ps.o; }
  function yToStart(y){ var lo=0,hi=measuredCount-1,ans=0; while(lo<=hi){var m=(lo+hi)>>1; if((blockTop[m]||0)<=y){ans=m;lo=m+1;}else hi=m-1;} return {b:ans,o:y-(blockTop[ans]||0)}; }
  function yToPage(y){ var lo=0,hi=pageStarts.length-1,ans=0; while(lo<=hi){var m=(lo+hi)>>1; if(absY(pageStarts[m])<=y+1){ans=m;lo=m+1;}else hi=m-1;} return ans; }

  function extendPages(){
    var H=pageH; if(H<=0) return;
    while(pgBlock<measuredCount){
      var top=blockTop[pgBlock], bot=top+blockH[pgBlock];
      if(bot-pgCurY>H){ if(top>pgCurY+1) pgCurY=top; else pgCurY=pgCurY+H; pageStarts.push(yToStart(pgCurY)); }
      else pgBlock++;
    }
    totalPages=pageStarts.length;
  }

  function openWork(w, pendingTerm){
    docTitle.textContent=w.name; pageEl.innerHTML=''; measurer.innerHTML=''; pageno.textContent='…';
    resetFind();
    library.classList.add('hidden'); reader.classList.add('active');
    getText(w).then(function(text){
      blocks=mdToBlocks(text);
      page=0; pendingY=0;
      beginMeasure();
      if(document.fonts&&document.fonts.ready){ var tk=measureToken; document.fonts.ready.then(function(){ if(tk===measureToken){ pendingY=absY(pageStarts[page]||{b:0,o:0}); beginMeasure(); } }); }
      if(pendingTerm) setTimeout(function(){ openFind(pendingTerm); }, 120);
    }).catch(function(err){ blocks=['<p>'+esc(err.message||'Could not open this document.')+'</p>']; page=0; pendingY=0; beginMeasure(); });
  }

  function beginMeasure(){
    setMetrics();
    blockTop=[]; blockH=[]; measuredCount=0; totalHeight=0;
    pageStarts=[{b:0,o:0}]; pgCurY=0; pgBlock=0; totalPages=1; firstRenderDone=false;
    measuring=true;
    var myToken=++measureToken;
    function chunk(){
      if(myToken!==measureToken) return;
      var BATCH=200, end=Math.min(measuredCount+BATCH, blocks.length);
      measurer.innerHTML=blocks.slice(measuredCount,end).join('');
      var kids=measurer.children, base=totalHeight;
      for(var j=0;j<kids.length;j++){ blockTop[measuredCount+j]=base+kids[j].offsetTop; blockH[measuredCount+j]=kids[j].offsetHeight; }
      totalHeight=base+measurer.scrollHeight;
      measuredCount=end;
      extendPages();
      if(!firstRenderDone){ firstRenderDone=true; page=Math.min(yToPage(pendingY), totalPages-1); renderPage(); }
      if(measuredCount<blocks.length){ setTimeout(chunk,0); }
      else { measuring=false; measurer.innerHTML=''; page=Math.min(yToPage(pendingY), totalPages-1); renderPage(); }
    }
    chunk();
  }

  function renderPage(){
    var st=pageStarts[page]||{b:0,o:0};
    var topY=(blockTop[st.b]||0)+st.o, e=st.b;
    while(e<blocks.length-1 && blockTop[e+1]!=null && blockTop[e+1] < topY+pageH+1) e++;
    pageEl.innerHTML=blocks.slice(st.b, e+1).join('');
    if(currentTerm) wrapMatches(pageEl, currentTerm);
    pageEl.style.transform='translateY('+(-st.o)+'px)';
    pageno.textContent=(page+1)+' / '+totalPages+(measuring?'…':'');
  }
  function next(){ if(page<totalPages-1){page++;renderPage();} }
  function prev(){ if(page>0){page--;renderPage();} }
  function closeReader(){ reader.classList.remove('active'); library.classList.remove('hidden'); resetFind(); measureToken++; blocks=[]; pageEl.innerHTML=''; }
  backBtn.addEventListener('click', closeReader);

  // ---------- In-book find ----------
  function wrapMatches(root, term){
    var low=term.toLowerCase(), L=term.length;
    var walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    var nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(function(node){
      var text=node.nodeValue, tl=text.toLowerCase(), i=tl.indexOf(low);
      if(i<0) return;
      var frag=document.createDocumentFragment(), last=0;
      while(i>=0){
        if(i>last) frag.appendChild(document.createTextNode(text.slice(last,i)));
        var m=document.createElement('mark'); m.textContent=text.slice(i,i+L); frag.appendChild(m);
        last=i+L; i=tl.indexOf(low,last);
      }
      if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    });
  }
  function buildMatches(term){
    var q=term.toLowerCase(); matches=[];
    for(var b=0;b<blocks.length;b++){
      var t=blocks[b].replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/gi,' ').toLowerCase();
      var pos=t.indexOf(q);
      while(pos>=0){ matches.push(b); if(matches.length>=5000) return; pos=t.indexOf(q,pos+q.length); }
    }
  }
  function findInBook(term){
    term=(term||'').trim(); currentTerm=term; matches=[]; curMatch=-1;
    if(term) buildMatches(term);
    if(matches.length){ curMatch=0; gotoMatch(0); } else renderPage();
    updateFindCount();
  }
  function gotoMatch(i){
    if(!matches.length) return;
    curMatch=((i%matches.length)+matches.length)%matches.length;
    var y=blockTop[matches[curMatch]]!=null?blockTop[matches[curMatch]]:0;
    page=yToPage(y); renderPage(); updateFindCount();
  }
  function updateFindCount(){ findCount.textContent = currentTerm ? (matches.length? (curMatch+1)+'/'+matches.length : '0/0') : ''; }
  function openFind(term){ findbar.classList.remove('hidden'); if(term!=null){ findInput.value=term; findInBook(term); } else setTimeout(function(){ findInput.focus(); },0); }
  function resetFind(){ findbar.classList.add('hidden'); matches=[]; curMatch=-1; currentTerm=''; findInput.value=''; findCount.textContent=''; }
  function closeFindKeepPlace(){ findbar.classList.add('hidden'); if(currentTerm){ currentTerm=''; matches=[]; curMatch=-1; findCount.textContent=''; renderPage(); } }
  findbtn.addEventListener('click', function(){ if(findbar.classList.contains('hidden')) openFind(null); else closeFindKeepPlace(); });
  $('findclose').addEventListener('click', closeFindKeepPlace);
  $('findnext').addEventListener('click', function(){ if(matches.length) gotoMatch(curMatch+1); });
  $('findprev').addEventListener('click', function(){ if(matches.length) gotoMatch(curMatch-1); });
  findInput.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); var v=findInput.value.trim(); if(v && v===currentTerm && matches.length) gotoMatch(curMatch+1); else findInBook(v); } });

  // ---------- Gestures ----------
  var sx=0, sy=0, tracking=false;
  function onUI(t){ return t && t.closest && t.closest('#topbar,#findbar'); }
  reader.addEventListener('touchstart', function(e){ if(onUI(e.target)){ tracking=false; return; } tracking=true; sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
  reader.addEventListener('touchmove', function(e){ if(!tracking) return; var dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy; if(Math.abs(dx)>Math.abs(dy)) e.preventDefault(); }, {passive:false});
  reader.addEventListener('touchend', function(e){
    if(!tracking) return; tracking=false;
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>32 && Math.abs(dx)>Math.abs(dy)){ if(dx<0) next(); else prev(); }
    else if(Math.abs(dx)<12 && Math.abs(dy)<12){ if(sx>window.innerWidth*0.5) next(); else prev(); }
  }, {passive:true});
  window.addEventListener('keydown', function(e){
    if(!reader.classList.contains('active')) return;
    if(document.activeElement===findInput) return;
    if(e.key==='ArrowRight'||e.key===' '){ next(); e.preventDefault(); }
    else if(e.key==='ArrowLeft'){ prev(); e.preventDefault(); }
    else if(e.key==='Escape'){ if(!findbar.classList.contains('hidden')) closeFindKeepPlace(); else closeReader(); }
  });
  var rt; window.addEventListener('resize', function(){ if(!reader.classList.contains('active')||!blocks.length) return; clearTimeout(rt); rt=setTimeout(function(){ pendingY=absY(pageStarts[page]||{b:0,o:0}); beginMeasure(); }, 160); });

  // ---------- Settings ----------
  function openSettings(){ $('s-owner').value=cfg.owner||''; $('s-repo').value=cfg.repo||''; $('s-branch').value=cfg.branch||'main'; $('s-token').value=cfg.token||''; settings.classList.remove('hidden'); }
  function closeSettings(){ settings.classList.add('hidden'); }
  gear.addEventListener('click', openSettings);
  $('s-cancel').addEventListener('click', closeSettings);
  $('s-save').addEventListener('click', function(){ cfg.owner=$('s-owner').value.trim(); cfg.repo=$('s-repo').value.trim(); cfg.branch=$('s-branch').value.trim()||'main'; cfg.token=$('s-token').value.trim(); saveCfg(); closeSettings(); loadLibrary(); });
  refreshBtn.addEventListener('click', loadLibrary);

  // ---------- Service worker ----------
  if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
    window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }

  // ---------- Init ----------
  if(!cfg.token) openSettings();
  loadLibrary();
})();
</script>
</body>
